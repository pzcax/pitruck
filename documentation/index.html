<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitruck Documentation</title>
  <style>
    :root {
      --bg: #090d16;
      --text: #cbd5e1;
      --sidebar-bg: #0f172a;
      --sidebar-border: #1e293b;
      --link: #60a5fa;
      --code-bg: #030712;
      --code-text: #e2e8f0;
      --inline-code-bg: #1e293b;
      --inline-code-text: #f59e0b;
      --heading: #f8fafc;
      --border: #1e293b;
      --accent: #3b82f6;
      --note-bg: rgba(30, 58, 138, 0.2);
      --note-border: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      color: var(--heading);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    h2 {
      font-size: 1.25rem;
      color: var(--heading);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    .version-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .version-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--text);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    .version-list a:hover {
      color: var(--link);
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.4);
    }

    .version-list a:hover {
      color: var(--link);
    }

    .version-number {
      font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
      color: var(--heading);
    }

    .version-list a:hover .version-number {
      color: var(--link);
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: #64748b;
      font-size: 0.85rem;
      text-align: center;
    }

    footer a {
      color: var(--link);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    * {
      scrollbar-width: none;
      scrollbar-color: #334155 transparent;
    }
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    @media (max-width: 768px) {
      body { padding: 1.5rem; }
      h1 { font-size: 1.875rem; }
      .version-list a { padding: 1rem 1.25rem; font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Documentation</h1>
  <p class="subtitle">Select a version to view its technical reference.</p>

  <h2>Available Versions</h2>
  <ul class="version-list">
    <li>
      <a href="technical_reference_1.6.1.html">
        <span>
          <span class="version-number">1.6.1 (latest)</span>
        </span>
      </a>
    </li>
    <li>
      <a href="technical_reference_1.6.0.html">
        <span>
          <span class="version-number">1.6.0</span>
        </span>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
